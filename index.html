<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOSER · Panel Administrador</title>
<style>
:root{
  --carbon:#333333;--carbon-2:#2A2A2A;--ink:#2A2A2A;
  --orange:#F49A0F;--orange-d:#DE7C08;--green:#7DB61C;--green-d:#5E8E13;
  --paper:#F4F5F3;--card:#FFFFFF;--line:#E4E4DF;--muted:#8C8C86;
  --crit:#C62828;--alto:#EF6C00;--medio:#F9A825;--bajo:#7DB61C;
  --shadow:0 10px 30px rgba(51,51,51,.10);--shadow-sm:0 4px 14px rgba(51,51,51,.08);
  --grad:linear-gradient(120deg,var(--orange),var(--green));
  --grad-soft:linear-gradient(135deg,rgba(244,154,15,.12),rgba(125,182,28,.12));
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--paper);color:var(--ink);line-height:1.45;font-size:15px;}
.hidden{display:none!important;}
.app{max-width:1100px;margin:0 auto;min-height:100vh;}

.topbar{position:sticky;top:0;z-index:40;background:var(--carbon);color:#fff;display:flex;align-items:center;gap:13px;padding:14px 20px;box-shadow:0 2px 16px rgba(0,0,0,.20);}
.logo{width:42px;height:42px;flex:0 0 auto;border-radius:12px;background:#fff;padding:5px;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 10px rgba(0,0,0,.18);}
.logo svg{width:100%;height:100%;}
.brand{display:flex;flex-direction:column;line-height:1.06;}
.brand b{font-size:19px;letter-spacing:2.5px;font-weight:800;}
.brand span{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:2.5px;background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
.topbar .right{margin-left:auto;display:flex;gap:10px;align-items:center;}
.notifbtn{background:rgba(255,255,255,.10);border:none;color:#fff;padding:9px 14px;border-radius:11px;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:7px;}
.notifbtn.on{background:var(--green);}
.refreshbtn{background:rgba(255,255,255,.10);border:none;color:#fff;width:42px;height:42px;border-radius:11px;font-size:17px;cursor:pointer;}
.refreshbtn:active{background:rgba(255,255,255,.22);}

.content{padding:20px;}
.setup{max-width:520px;margin:40px auto;}
.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:22px;box-shadow:var(--shadow-sm);margin-bottom:16px;}
label.fld{display:block;font-size:12.5px;font-weight:800;color:var(--muted);margin:0 0 8px;text-transform:uppercase;letter-spacing:.5px;}
input[type=text],input[type=url]{width:100%;border:1.5px solid var(--line);border-radius:13px;padding:14px 15px;font-size:15px;font-family:inherit;background:#fff;outline:none;}
input:focus{border-color:var(--orange);box-shadow:0 0 0 3px rgba(244,154,15,.15);}
.btn{border:none;border-radius:13px;padding:15px 20px;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;justify-content:center;gap:8px;}
.btn.accent{background:var(--grad);color:#fff;box-shadow:0 6px 20px rgba(244,154,15,.32);width:100%;}
.btn.dark{background:var(--carbon);color:#fff;}
.btn.ghost{background:#fff;border:1.5px solid var(--line);color:var(--muted);}
.btn:active{transform:scale(.98);}
.btn:disabled{opacity:.5;cursor:not-allowed;}

/* KPIs */
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:13px;margin-bottom:18px;}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px 18px;box-shadow:var(--shadow-sm);position:relative;overflow:hidden;}
.kpi .n{font-size:30px;font-weight:800;color:var(--carbon);line-height:1;}
.kpi .l{font-size:12px;color:var(--muted);font-weight:700;margin-top:4px;text-transform:uppercase;letter-spacing:.5px;}
.kpi .bar{position:absolute;left:0;top:0;bottom:0;width:4px;}
.kpi.crit .bar{background:var(--crit);}.kpi.alto .bar{background:var(--alto);}.kpi.medio .bar{background:var(--medio);}.kpi.bajo .bar{background:var(--bajo);}.kpi.tot .bar{background:var(--grad);}

/* categorías chips */
.catbar{display:flex;flex-wrap:wrap;gap:9px;margin-bottom:18px;}
.catchip{background:#fff;border:1.5px solid var(--line);border-radius:22px;padding:9px 15px;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:8px;color:var(--carbon);}
.catchip.sel{border-color:var(--orange);background:rgba(244,154,15,.08);}
.catchip .cnt{background:var(--paper);border-radius:12px;padding:1px 8px;font-size:12px;font-weight:800;color:var(--muted);}
.catchip.sel .cnt{background:var(--orange);color:#fff;}

/* filtros */
.filters{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;align-items:center;}
.filters select,.filters input{border:1.5px solid var(--line);border-radius:11px;padding:11px 13px;font-size:14px;font-family:inherit;background:#fff;}
.filters .search{flex:1;min-width:180px;}

/* lista de casos */
.cases{display:grid;gap:12px;}
.case{background:var(--card);border:1px solid var(--line);border-left:5px solid var(--line);border-radius:15px;padding:16px 18px;box-shadow:var(--shadow-sm);cursor:pointer;transition:transform .1s;}
.case:active{transform:scale(.995);}
.case.crit{border-left-color:var(--crit);}.case.alto{border-left-color:var(--alto);}.case.medio{border-left-color:var(--medio);}.case.bajo{border-left-color:var(--bajo);}
.case .top{display:flex;align-items:center;gap:10px;margin-bottom:7px;flex-wrap:wrap;}
.case .sev{font-size:11px;font-weight:800;padding:3px 10px;border-radius:20px;text-transform:uppercase;letter-spacing:.5px;color:#fff;}
.case .sev.crit{background:var(--crit);}.case .sev.alto{background:var(--alto);}.case .sev.medio{background:var(--medio);color:#5a4500;}.case .sev.bajo{background:var(--bajo);}
.case .cid{font-weight:800;color:var(--carbon);font-size:14px;}
.case .cat{font-size:12px;color:var(--muted);font-weight:700;}
.case .est{font-weight:700;color:var(--carbon);font-size:15px;margin-bottom:3px;}
.case .desc{color:#555;font-size:13.5px;margin-bottom:8px;}
.case .meta{display:flex;gap:14px;flex-wrap:wrap;font-size:12px;color:var(--muted);}
.case .meta b{color:var(--carbon);font-weight:600;}
.case .badges{margin-top:8px;display:flex;gap:7px;flex-wrap:wrap;}
.badge{font-size:11px;font-weight:800;padding:2px 9px;border-radius:12px;}
.badge.vis{background:rgba(125,182,28,.15);color:var(--green-d);}
.badge.der{background:rgba(23,105,170,.12);color:#1769AA;}
.badge.enc{background:var(--paper);color:var(--muted);}
.badge.new{background:var(--crit);color:#fff;}

/* modal detalle */
.modal-bg{position:fixed;inset:0;background:rgba(42,42,42,.55);z-index:60;display:flex;align-items:flex-end;justify-content:center;animation:fade .2s;}
@keyframes fade{from{opacity:0}to{opacity:1}}
.modal{background:var(--paper);width:100%;max-width:640px;max-height:92vh;overflow-y:auto;border-radius:22px 22px 0 0;animation:up .25s;}
@media(min-width:700px){.modal-bg{align-items:center;}.modal{border-radius:22px;}}
@keyframes up{from{transform:translateY(30px)}to{transform:none}}
.modal header{position:sticky;top:0;background:var(--carbon);color:#fff;padding:16px 20px;display:flex;align-items:center;gap:10px;}
.modal header .sev{font-size:11px;font-weight:800;padding:3px 10px;border-radius:20px;}
.modal header b{font-size:16px;}
.modal header .x{margin-left:auto;background:rgba(255,255,255,.15);border:none;color:#fff;width:36px;height:36px;border-radius:10px;font-size:18px;cursor:pointer;}
.modal .body{padding:20px;}
.drow{display:flex;justify-content:space-between;gap:14px;padding:10px 0;border-bottom:1px solid var(--line);font-size:14px;}
.drow span{color:var(--muted);font-weight:700;}
.drow b{text-align:right;color:var(--carbon);font-weight:600;word-break:break-word;}
.dsection{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--orange-d);margin:18px 0 8px;}
.verif-links a{display:block;color:#1769AA;font-size:13px;padding:6px 0;word-break:break-all;}
.derive-box{background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px;margin-top:16px;}
.derive-box .btns{display:flex;gap:10px;margin-top:12px;}
.mapbtn{display:inline-flex;align-items:center;gap:6px;color:#1769AA;font-weight:700;font-size:13px;text-decoration:none;margin-top:6px;}

.empty{text-align:center;padding:50px 20px;color:var(--muted);}
.empty .ic{font-size:44px;margin-bottom:12px;}
.toast{position:fixed;left:50%;bottom:30px;transform:translateX(-50%);background:var(--carbon);color:#fff;padding:14px 24px;border-radius:30px;font-size:14px;font-weight:700;z-index:80;box-shadow:var(--shadow);}
.spinner{width:16px;height:16px;border:3px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:50%;display:inline-block;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.loading{text-align:center;padding:40px;color:var(--muted);}
.sync{font-size:12px;color:var(--muted);margin-bottom:14px;display:flex;align-items:center;gap:7px;}
.sync .dot{width:8px;height:8px;border-radius:50%;background:var(--green);}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="logo" id="logoSlot"></div>
    <div class="brand"><b>SOSER</b><span>Administrador</span></div>
    <div class="right">
      <button class="notifbtn" id="btnNotif">🔔 Notificaciones</button>
      <button class="refreshbtn" id="btnRefresh" title="Actualizar">⟳</button>
    </div>
  </div>
  <div class="content" id="content"></div>
</div>
<div id="overlays"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="admin.js"></script>
</body>
</html>
